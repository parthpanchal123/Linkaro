<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f3f4f6">
  <title>Linkaro</title>
  <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <a class="skip-link" href="#mainContent">Skip to Main Content</a>
  <!-- User Bar -->
  <div class="user-bar">
    <div class="user-email">
      <i class="fas fa-user-circle" aria-hidden="true"></i>
      <span id="userEmail">Loading…</span>
    </div>
    <div class="user-actions">
      <button id="themeToggleBtn" class="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
        <i class="fas fa-moon" aria-hidden="true"></i>
      </button>
      <button id="signOutBtn" class="sign-out-btn" title="Sign Out" aria-label="Sign Out">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <main id="mainContent">
    <h1 class="sr-only">Linkaro</h1>
    <!-- Header -->
    <div class="app-header">
      <div>
        <img src="link_icon.png" alt="Linkaro Logo" width="24" height="24" class="app-logo">
        <h2>Linkaro</h2>
        <span id="linkCount" class="link-count"></span>
      </div>
      <div>
        <button id="saveTabBtn" class="btn-save-tab" title="Save current tab">
          <i class="fas fa-window-maximize" aria-hidden="true"></i>
          <span class="save-tab-label-full">Save Current Tab</span>
          <span class="save-tab-label-short">Save Tab</span>
        </button>
      </div>
    </div>

    <!-- Search Area -->
    <div class="search-area">
      <div class="search-box">
        <i class="fas fa-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" name="search" aria-label="Search Links" autocomplete="off" placeholder="Search name, URL, or category…">
        <button id="searchClearBtn" class="search-clear" title="Clear search" aria-label="Clear Search">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <!-- Info -->
    <div id="instructionText" class="info-bar">
      <i class="fas fa-info-circle" aria-hidden="true"></i>
      <span class="info-copy-hint">Hover pill to copy</span>
      <span id="infoShortcutHint" class="info-shortcut-hint">• <kbd>Alt</kbd> + <kbd>N</kbd> to add</span>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading-spinner" style="display: none;">
      <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
      <p>Loading your links…</p>
    </div>

    <!-- Bubbles Area -->
    <div class="bubbles-area" id="bubblesArea"></div>

    <!-- Active Field Area -->
    <div class="active-field-area" id="activeFieldArea"></div>
  </main>

  <button id="addFabBtn" class="btn-add-link fab-add-link is-hidden" title="Add New Link (Alt+N)" aria-label="Add New Link (Alt+N)" aria-keyshortcuts="Alt+N">
    <i class="fas fa-plus" aria-hidden="true"></i>
  </button>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title" id="confirmModalTitle">Confirm</h3>
      <p class="modal-desc" id="confirmModalDesc">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="btn-cancel">Cancel</button>
        <button id="confirmOkBtn" class="btn-danger">OK</button>
      </div>
    </div>
  </div>

  <!-- Custom Modal -->
  <div id="customModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">New Link</h3>
      <p class="modal-desc">Add a new link to your collection:</p>
      <div class="modal-fields">
        <div class="modal-field-group">
          <label for="modalInput" class="modal-label">Name</label>
          <input type="text" id="modalInput" name="linkName" autocomplete="off" placeholder="e.g. Github, TikTok" />
        </div>
        <div class="modal-field-group">
          <label for="modalUrlInput" class="modal-label">URL <span class="modal-label-note">(optional)</span></label>
          <input type="url" id="modalUrlInput" name="linkUrl" autocomplete="off" placeholder="https://…" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn-cancel">Cancel</button>
        <button id="modalOkBtn" class="btn-ok">Add</button>
      </div>
    </div>
  </div>

  <!-- Prompt Modal -->
  <div id="simplePromptModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title" id="promptModalTitle">Prompt</h3>
      <p class="modal-desc" id="promptModalDesc">Enter value:</p>
      <div class="modal-fields">
        <div class="modal-field-group">
          <input type="text" id="promptModalInput" name="promptValue" aria-label="Prompt Value" autocomplete="off" placeholder="Type here…" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="promptModalCancelBtn" class="btn-cancel">Cancel</button>
        <button id="promptModalOkBtn" class="btn-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" aria-live="polite" role="status"></div>

  <!-- Firebase + DB Bundle (MV3-safe, no remote code) -->
  <script src="./dist/firebase-bundle.js"></script>

  <!-- Main App (uses globals exposed by firebase-bundle) -->
  <script src="./app.js"></script>
</body>

</html>
