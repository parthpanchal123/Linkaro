<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linkaro</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- User Bar -->
  <div class="user-bar">
    <div class="user-email">
      <i class="fas fa-user-circle"></i>
      <span id="userEmail">Loading...</span>
    </div>
    <div style="display:flex; gap:8px;">
      <button id="themeToggleBtn" class="theme-toggle" title="Toggle Theme">
        <i class="fas fa-moon"></i>
      </button>
      <button id="signOutBtn" class="sign-out-btn" title="Sign Out">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <main>
    <!-- Header -->
    <div class="app-header">
      <div>
        <img src="link_icon.png" alt="Linkaro Logo" width="24" height="24" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;border-radius:4px;">
        <h2>Linkaro</h2>
        <span id="linkCount" class="link-count"></span>
      </div>
      <div>
        <button id="saveTabBtn" class="btn-save-tab" title="Save current tab">
          <i class="fas fa-window-maximize"></i> Save Tab
        </button>
        <button id="addHeaderBtn" class="btn-add-link" title="Add New Link">
          <i class="fas fa-plus"></i> Add Link
        </button>
      </div>
    </div>

    <!-- Search Area -->
    <div class="search-area">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search name, URL, or category...">
        <button id="searchClearBtn" class="search-clear" title="Clear search">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Info -->
    <div id="instructionText" class="info-bar">
      <i class="fas fa-info-circle"></i>
      Click a tag to view or update your link
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading-spinner" style="display: none;">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Loading your links...</p>
    </div>

    <!-- Bubbles Area -->
    <div class="bubbles-area" id="bubblesArea"></div>

    <!-- Active Field Area -->
    <div class="active-field-area" id="activeFieldArea"></div>
  </main>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title" id="confirmModalTitle">Confirm</h3>
      <p class="modal-desc" id="confirmModalDesc">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="btn-cancel">Cancel</button>
        <button id="confirmOkBtn" class="btn-danger">OK</button>
      </div>
    </div>
  </div>

  <!-- Custom Modal -->
  <div id="customModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">New Link</h3>
      <p class="modal-desc">Add a new link to your collection:</p>
      <div class="modal-fields">
        <div class="modal-field-group">
          <label for="modalInput" class="modal-label">Name</label>
          <input type="text" id="modalInput" placeholder="e.g. Github, TikTok" />
        </div>
        <div class="modal-field-group">
          <label for="modalUrlInput" class="modal-label">URL <span style="color: var(--text-secondary); font-weight: 400;">(optional)</span></label>
          <input type="url" id="modalUrlInput" placeholder="https://..." />
        </div>
      </div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn-cancel">Cancel</button>
        <button id="modalOkBtn" class="btn-ok">Add</button>
      </div>
    </div>
  </div>

  <!-- Prompt Modal -->
  <div id="simplePromptModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title" id="promptModalTitle">Prompt</h3>
      <p class="modal-desc" id="promptModalDesc">Enter value:</p>
      <div class="modal-fields">
        <div class="modal-field-group">
          <input type="text" id="promptModalInput" placeholder="Type here..." />
        </div>
      </div>
      <div class="modal-actions">
        <button id="promptModalCancelBtn" class="btn-cancel">Cancel</button>
        <button id="promptModalOkBtn" class="btn-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Firebase + DB Bundle (MV3-safe, no remote code) -->
  <script src="./dist/firebase-bundle.js"></script>

  <!-- Main App (uses globals exposed by firebase-bundle) -->
  <script src="./app.js"></script>
</body>

</html>
