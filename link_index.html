<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linkaro</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- User Bar -->
  <div class="user-bar">
    <div class="user-email">
      <i class="fas fa-user-circle"></i>
      <span id="userEmail">Loading...</span>
    </div>
    <button id="signOutBtn" class="sign-out-btn">
      <i class="fas fa-sign-out-alt"></i> Sign Out
    </button>
  </div>

  <main>
    <!-- Header -->
    <div class="app-header">
      <i class="fa fa-link" style="font-size: 20px;"></i>
      <h2>Linkaro</h2>
    </div>

    <!-- Search Area -->
    <div class="search-area">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search name or URL...">
      </div>
    </div>

    <!-- Info -->
    <div class="info-bar">
      <i class="fas fa-info-circle"></i>
      Click a tag to view or update your link
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading-spinner" style="display: none;">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Loading your links...</p>
    </div>

    <!-- Bubbles Area -->
    <div class="bubbles-area" id="bubblesArea"></div>

    <!-- Active Field Area -->
    <div class="active-field-area" id="activeFieldArea"></div>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Firebase SDKs -->
  <script src="./firebase-app-compat.js"></script>
  <script src="./firebase-auth-compat.js"></script>
  <script src="./firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="./firebase-config.js"></script>
  <script src="./firebase-db.js"></script>
  <script src="./app.js"></script>
</body>

</html>
