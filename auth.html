<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f3f4f6">
  <title>Linkaro — Sign In</title>
  <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="auth-body">
  <a class="skip-link" href="#authMain">Skip to Main Content</a>
  <main id="authMain">
  <div class="auth-container">
    <div class="auth-header">
      <img src="link_icon.png" alt="Linkaro Logo" width="48" height="48" class="auth-icon">
      <h1 class="auth-title">Linkaro</h1>
      <p class="auth-subtitle">Your links, everywhere.</p>
    </div>

    <form id="authForm" class="auth-form">
      <div class="input-group">
        <label for="emailInput" class="sr-only">Email Address</label>
        <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
        <input type="email" id="emailInput" name="email" autocomplete="email" spellcheck="false" placeholder="Email address…" required>
      </div>

      <div class="input-group">
        <label for="passwordInput" class="sr-only">Password</label>
        <i class="fas fa-lock input-icon" aria-hidden="true"></i>
        <input type="password" id="passwordInput" name="password" autocomplete="current-password" placeholder="Password…" required minlength="6">
      </div>

      <div id="errorMsg" class="error-msg" aria-live="polite"></div>

      <button type="submit" id="submitBtn" class="auth-btn">
        <span id="btnText">Log In</span>
        <i id="btnSpinner" class="fas fa-spinner fa-spin" aria-hidden="true"></i>
      </button>

      <div class="divider">
        <span>OR</span>
      </div>

      <button type="button" id="googleBtn" class="google-btn">
        <span id="googleBtnContent">
          <i class="fab fa-google" aria-hidden="true"></i>
          Continue with Google
        </span>
        <i id="googleBtnSpinner" class="fas fa-spinner fa-spin" aria-hidden="true"></i>
      </button>
    </form>

    <p class="toggle-text">
      <span id="toggleMsg">Don't have an account? </span>
      <button type="button" id="toggleBtn" class="toggle-link">Sign Up</button>
    </p>
  </div>
  </main>

  <!-- Firebase + Auth Bundle (MV3-safe, no remote code) -->
  <script src="./dist/auth-bundle.js"></script>
</body>

</html>
